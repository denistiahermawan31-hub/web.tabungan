<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabunganku</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loginPage" class="auth-wrapper">
        <div class="login-container animate-fade-in">
            <div class="logo-placeholder">
                <div class="image-box">
                    <img src="https://i.ibb.co.com/7t463KTz/logo.png" alt="Logo">
                </div>
            </div>
            <h2>Welcome Here💰</h2>
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Nama (Username)</label>
                    <input type="text" id="username" placeholder="Masukkan nama Anda" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Masukkan password" required>
                </div>
                <div class="remember-group">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe">Simpan password di kolom input</label>
                </div>
                <button type="submit" class="btn-primary">Login</button>
            </form>
        </div>
    </div>

    <div id="dashboardPage" class="hidden">
        <nav class="navbar">
            <div class="nav-brand">
                <span class="nav-title">Tabunganku</span>
            </div>
            <div class="nav-user">
                <span id="userGreeting">User</span>
                <button id="logoutBtn" class="btn-logout">Logout</button>
            </div>
        </nav>

        <main class="dashboard-container animate-fade-in">
            <div class="balance-card">
                <p class="card-label">Saldo Akhir</p>
                <h1 id="totalBalance">Rp 0</h1>
            </div>

            <div class="dashboard-grid">
                <div class="left-column">
                    <section class="card-section">
                        <h3>Input Tabungan</h3>
                        <form id="transactionForm">
                            <div class="input-group">
                                <label for="date">Tanggal</label>
                                <input type="date" id="date" required>
                            </div>
                            <div class="input-group">
                                <label for="amount">Jumlah Uang (Rp)</label>
                                <input type="number" id="amount" placeholder="Contoh: 50000" min="1" required>
                            </div>
                            <div class="input-group">
                                <label for="type">Tipe Transaksi</label>
                                <select id="type" required>
                                    <option value="income">Pemasukan</option>
                                    <option value="expense">Pengeluaran</option>
                                </select>
                            </div>
                            <div class="input-group hidden" id="descGroup">
                                <label for="description">Keterangan Pengeluaran</label>
                                <input type="text" id="description" placeholder="Contoh: jajan kantin, beli minum">
                            </div>
                            <button type="submit" class="btn-primary">Submit</button>
                        </form>
                    </section>

                    <section class="card-section">
                        <h3>Ringkasan</h3>
                        <div class="summary-box">
                            <div class="summary-item total-income">
                                <span class="label">Total Pemasukan</span>
                                <span id="summaryIncome" class="val">Rp 0</span>
                            </div>
                            <div class="summary-item total-expense">
                                <span class="label">Total Pengeluaran</span>
                                <span id="summaryExpense" class="val">Rp 0</span>
                            </div>
                        </div>
                    </section>
                </div>

                <div class="right-column">
                    <section class="card-section">
                        <h3>Tabel Riwayat Transaksi</h3>
                        <div class="table-container">
                            <table class="transaction-table">
                                <thead>
                                    <tr>
                                        <th>Tanggal</th>
                                        <th>Tipe</th>
                                        <th>Jumlah</th>
                                        <th>Keterangan</th>
                                        <th style="width: 50px;">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody id="transactionTableBody"></tbody>
                            </table>
                            <p id="emptyMessage" class="empty-message">Belum ada riwayat transaksi.</p>
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
